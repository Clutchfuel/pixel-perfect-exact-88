name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_SITE_URL: https://pixel-perfect-exact-88-b80bf162.lovable.app
      CI: true
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
