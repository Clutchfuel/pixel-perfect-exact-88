name: CI

on:
  push:
    branches: [main, feat/cursor-optimization]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SITE_URL: https://pixel-perfect-exact-88.lovable.app
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run setup
      - run: bun run build
      - run: bun run test:clutch-score
      - name: E2E smoke
        run: |
          bun run preview --port 8080 --host &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:8080/ && break
            sleep 1
          done
          SKIP_BUILD=1 bash scripts/e2e-smoke.sh http://localhost:8080
          kill $PREVIEW_PID || true
